<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover" />
  <title>Tempify 1· Instant Temp Mail (Netlify Ready)</title>
  <!-- Google Fonts + Font Awesome 6 -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: radial-gradient(circle at 10% 20%, #0a0f1e, #070b17);
      min-height: 100vh;
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
    }

    .container {
      width: 100%;
      max-width: 1000px;
      margin: 0 auto;
      background: rgba(12, 18, 34, 0.85);
      backdrop-filter: blur(14px);
      border-radius: 2rem;
      border: 1px solid rgba(59, 130, 246, 0.35);
      box-shadow: 0 30px 50px -20px rgba(0, 0, 0, 0.6);
      overflow: hidden;
    }

    .header {
      padding: 20px 24px 12px 24px;
      border-bottom: 1px solid rgba(71, 85, 105, 0.5);
      background: rgba(2, 6, 23, 0.4);
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 800;
      background: linear-gradient(125deg, #E0F2FE, #7AA9FF, #A5F3FC);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    h1 i {
      background: none;
      color: #3b82f6;
      font-size: 1.7rem;
    }

    .sub {
      color: #90a3bf;
      font-size: 0.75rem;
      margin-top: 8px;
    }

    .email-card {
      margin: 20px 20px 16px 20px;
      background: rgba(15, 23, 42, 0.8);
      border-radius: 1.5rem;
      border: 1px solid #2d3a5e;
    }

    .email-label {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 18px 0 18px;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 600;
      color: #7aa2f7;
    }

    .email-input-area {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 18px 18px 18px;
      flex-wrap: wrap;
    }

    #email {
      flex: 1;
      background: #020617;
      border: 1px solid #334155;
      border-radius: 1.2rem;
      padding: 14px 18px;
      color: #f1f5f9;
      font-size: 0.9rem;
      font-weight: 500;
      outline: none;
      width: 100%;
      min-width: 0;
    }

    .copy-btn-icon {
      background: #1e2a47;
      border: none;
      padding: 12px 20px;
      border-radius: 1.2rem;
      color: #cbd5ff;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
      transition: 0.2s;
    }

    .copy-btn-icon:hover {
      background: #2d3a60;
      transform: translateY(-1px);
    }

    .action-group {
      display: flex;
      gap: 12px;
      margin: 0px 20px 22px 20px;
      flex-wrap: wrap;
    }

    .btn-modern {
      background: rgba(37, 99, 235, 0.2);
      border: 1px solid rgba(59, 130, 246, 0.6);
      padding: 11px 18px;
      border-radius: 2.5rem;
      font-weight: 600;
      font-size: 0.85rem;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      backdrop-filter: blur(4px);
      transition: all 0.2s ease;
      color: #eef2ff;
      flex: 1 0 auto;
      justify-content: center;
    }

    .btn-modern:active {
      transform: scale(0.97);
    }

    .btn-primary {
      background: #2563eb;
      border-color: #60a5fa;
      color: white;
      box-shadow: 0 6px 12px -6px #1e3a8a;
    }

    .inbox-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 20px 0px 20px;
    }

    .inbox-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: #cbd5ff;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .badge-count {
      background: #1e293b;
      padding: 2px 10px;
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: 600;
      color: #90cdf4;
    }

    .messages-area {
      padding: 12px 16px 28px 16px;
      max-height: 520px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
      -webkit-overflow-scrolling: touch;
    }

    .messages-area::-webkit-scrollbar {
      width: 4px;
    }
    .messages-area::-webkit-scrollbar-track {
      background: #0f172a;
      border-radius: 8px;
    }
    .messages-area::-webkit-scrollbar-thumb {
      background: #3b82f6;
      border-radius: 8px;
    }

    .mail-card {
      background: rgba(30, 41, 59, 0.75);
      backdrop-filter: blur(4px);
      border-radius: 1.25rem;
      padding: 1rem 1.2rem;
      cursor: pointer;
      transition: all 0.2s ease;
      border: 1px solid rgba(71, 85, 105, 0.6);
    }

    .mail-card:active {
      transform: scale(0.99);
      background: #2563eb20;
    }

    .mail-subject {
      font-weight: 700;
      font-size: 0.95rem;
      color: #f0f9ff;
      margin-bottom: 10px;
      word-break: break-word;
    }

    .mail-from {
      font-size: 0.75rem;
      color: #9bb5e6;
      display: flex;
      align-items: center;
      gap: 6px;
      word-break: break-all;
    }

    .mail-date {
      font-size: 0.65rem;
      color: #7f8ea3;
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 10px;
    }

    .empty-state {
      text-align: center;
      padding: 42px 20px;
      background: rgba(15, 23, 42, 0.5);
      border-radius: 1.8rem;
      border: 1px dashed #334155;
      color: #94a3b8;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .empty-state i {
      font-size: 2.8rem;
      opacity: 0.6;
    }

    .detail-view {
      background: #0f172af0;
      border-radius: 1.5rem;
      padding: 1.2rem;
      border: 1px solid #2d3e66;
      animation: fadeSlide 0.2s ease;
    }

    .detail-subject {
      font-size: 1.2rem;
      font-weight: 700;
      color: #eef2ff;
      margin-bottom: 16px;
      word-break: break-word;
    }

    .detail-meta {
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: #02061770;
      padding: 12px 14px;
      border-radius: 1rem;
      margin: 14px 0;
      font-size: 0.75rem;
    }

    .detail-meta span {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      word-break: break-word;
    }

    .message-body-content {
      background: #020617a0;
      padding: 18px;
      border-radius: 1.2rem;
      margin: 18px 0;
      overflow-x: auto;
      font-size: 0.85rem;
      line-height: 1.5;
      color: #e2e8f0;
    }

    .back-btn {
      background: #1e293b;
      border: none;
      padding: 12px 20px;
      border-radius: 2rem;
      font-weight: 500;
      color: #b9d0ff;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      justify-content: center;
    }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(8px);}
      to { opacity: 1; transform: translateY(0);}
    }

    footer {
      font-size: 0.65rem;
      text-align: center;
      padding: 16px 20px 20px;
      color: #5b6e8c;
      border-top: 1px solid rgba(71, 85, 105, 0.3);
    }

    @media (max-width: 580px) {
      body { padding: 12px; }
      h1 { font-size: 1.45rem; }
      .email-input-area { flex-direction: column; align-items: stretch; }
      .copy-btn-icon { justify-content: center; }
      .btn-modern { padding: 10px 12px; font-size: 0.8rem; }
      .messages-area { max-height: 460px; }
    }

    .toast-notify {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e3a8a;
      color: white;
      padding: 10px 20px;
      border-radius: 40px;
      font-size: 0.8rem;
      z-index: 9999;
      backdrop-filter: blur(12px);
      box-shadow: 0 4px 12px black;
      font-weight: 500;
      animation: fadeInUp 0.2s ease;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateX(-50%) translateY(20px);}
      to { opacity: 1; transform: translateX(-50%) translateY(0);}
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1><i class="fas fa-envelope-open-text"></i> Tempify</h1>
    <div class="sub"><i class="fas fa-check-circle"></i> Instant temp mail · Guerrilla Mail API · Works on Netlify</div>
  </div>

  <div class="email-card">
    <div class="email-label"><i class="fas fa-at"></i> <span>your temporary inbox</span></div>
    <div class="email-input-area">
      <input type="text" id="email" readonly placeholder="Click 'Generate Mail'">
      <button class="copy-btn-icon" id="copyBtn"><i class="fas fa-copy"></i> <span>Copy</span></button>
    </div>
  </div>

  <div class="action-group">
    <button class="btn-modern btn-primary" id="generateBtn"><i class="fas fa-magic"></i> Generate Mail</button>
    <button class="btn-modern" id="refreshBtn"><i class="fas fa-rotate-right"></i> Refresh Inbox</button>
  </div>

  <div class="inbox-header">
    <div class="inbox-title"><i class="fas fa-inbox"></i> Messages <span id="countBadge" class="badge-count">0</span></div>
    <i class="fas fa-chevron-down" style="color:#5680c7; font-size:0.7rem;"></i>
  </div>

  <div id="inbox" class="messages-area">
    <div class="empty-state"><i class="far fa-envelope"></i><span>Ready · tap "Generate Mail"</span></div>
  </div>
  <footer><i class="fas fa-sync-alt"></i> Auto-refresh 6s · All mails are temporary</footer>
</div>

<script>
  // ======================= GUERRILLA MAIL API (CORS-FRIENDLY & RELIABLE) =======================
  // This API works flawlessly on Netlify, Vercel, and any static hosting
  let currentEmailId = null;      // Stores email_addr (for display)
  let currentSid = null;          // Session ID for Guerrilla Mail
  let currentEmailTimestamp = null;
  
  // Helper: show toast message
  function showToast(msg, isError = false) {
    const existing = document.querySelector('.toast-notify');
    if(existing) existing.remove();
    const toast = document.createElement('div');
    toast.className = 'toast-notify';
    toast.style.background = isError ? '#b91c1c' : '#1e3a8a';
    toast.innerText = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2500);
  }

  // Function to generate a new temporary email address using Guerrilla Mail
  async function generateMail() {
    const genBtn = document.getElementById('generateBtn');
    const originalHtml = genBtn.innerHTML;
    genBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Creating...';
    genBtn.disabled = true;

    try {
      // Step 1: Get a new email address from Guerrilla Mail API
      const response = await fetch('https://api.guerrillamail.com/ajax.php?f=get_email_address&ip=127.0.0.1&agent=TempMailApp');
      const data = await response.json();
      
      if (data && data.email_addr) {
        currentEmailId = data.email_addr;
        currentSid = data.sid;
        currentEmailTimestamp = data.email_timestamp;
        
        // Update UI
        document.getElementById('email').value = currentEmailId;
        showToast('✅ Temporary email created!', false);
        
        // Load inbox immediately
        await loadInbox();
      } else {
        throw new Error('Could not generate email');
      }
    } catch (err) {
      console.error('Generation error:', err);
      showToast('⚠️ Failed to generate. Check internet connection.', true);
      document.getElementById('email').value = '';
      currentSid = null;
      currentEmailId = null;
      const inboxDiv = document.getElementById('inbox');
      inboxDiv.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><span>Error: ${err.message.substring(0, 60)}</span><span>Tap generate again</span></div>`;
      updateBadge(0);
    } finally {
      genBtn.innerHTML = originalHtml;
      genBtn.disabled = false;
    }
  }

  // Load all emails from Guerrilla Mail inbox using session ID
  async function loadInbox() {
    if (!currentSid || !currentEmailId) {
      const inboxDiv = document.getElementById('inbox');
      inboxDiv.innerHTML = `<div class="empty-state"><i class="fas fa-key"></i><span>No active session · Generate an email first</span></div>`;
      updateBadge(0);
      return;
    }

    try {
      // Fetch email list using fetch_email_list function
      const url = `https://api.guerrillamail.com/ajax.php?f=fetch_email_list&sid=${currentSid}&seq=0`;
      const response = await fetch(url);
      const data = await response.json();
      
      const emails = data.list || [];
      const inboxDiv = document.getElementById('inbox');
      
      if (emails.length === 0) {
        inboxDiv.innerHTML = `<div class="empty-state"><i class="far fa-inbox"></i><span>Your inbox is empty · waiting for new messages</span></div>`;
        updateBadge(0);
        return;
      }
      
      updateBadge(emails.length);
      // Sort by date descending (newest first)
      const sortedEmails = emails.sort((a, b) => b.timestamp - a.timestamp);
      inboxDiv.innerHTML = '';
      
      sortedEmails.forEach(mail => {
        const mailCard = document.createElement('div');
        mailCard.className = 'mail-card';
        mailCard.setAttribute('data-mail-id', mail.mail_id);
        const subject = mail.mail_subject || '(No Subject)';
        const from = mail.mail_from || 'Unknown Sender';
        const date = new Date(mail.timestamp * 1000);
        const formattedDate = date.toLocaleString(undefined, { hour: '2-digit', minute:'2-digit', day:'numeric', month:'short' });
        
        mailCard.innerHTML = `
          <div class="mail-subject"><span><i class="fas fa-envelope" style="margin-right:6px;"></i> ${escapeHtml(subject)}</span></div>
          <div class="mail-from"><i class="fas fa-user-circle"></i> ${escapeHtml(from)}</div>
          <div class="mail-date"><i class="far fa-clock"></i> ${formattedDate}</div>
        `;
        mailCard.addEventListener('click', () => openMail(mail.mail_id));
        inboxDiv.appendChild(mailCard);
      });
    } catch (err) {
      console.error('Inbox load error:', err);
      const inboxDiv = document.getElementById('inbox');
      inboxDiv.innerHTML = `<div class="empty-state"><i class="fas fa-bug"></i><span>Failed to load inbox</span><span>↻ Tap Refresh</span></div>`;
    }
  }

  // Open and display full email content
  async function openMail(mailId) {
    if (!currentSid) return;
    
    try {
      const url = `https://api.guerrillamail.com/ajax.php?f=fetch_email&sid=${currentSid}&email_id=${mailId}`;
      const response = await fetch(url);
      const data = await response.json();
      
      if (!data || !data.mail_id) {
        throw new Error('Cannot fetch email content');
      }
      
      const mail = data;
      const subject = mail.mail_subject || '(No Subject)';
      const from = mail.mail_from || 'Unknown';
      const date = new Date(mail.timestamp * 1000);
      const formattedDate = date.toLocaleString(undefined, { hour: '2-digit', minute:'2-digit', day:'numeric', month:'long', year:'numeric' });
      
      // Extract email body (plain text or fallback)
      let bodyText = mail.mail_text || mail.mail_excerpt || '(No content)';
      // Sometimes body contains HTML, we'll display as preformatted
      const isHtml = bodyText.includes('<') && bodyText.includes('>');
      let displayContent = '';
      if (isHtml) {
        displayContent = `<div style="overflow-x:auto;">${bodyText}</div>`;
      } else {
        displayContent = `<pre>${escapeHtml(bodyText)}</pre>`;
      }
      
      const inboxContainer = document.getElementById('inbox');
      inboxContainer.innerHTML = `
        <div class="detail-view">
          <div class="detail-subject"><i class="far fa-envelope-open" style="margin-right:8px;"></i> ${escapeHtml(subject)}</div>
          <div class="detail-meta">
            <span><i class="fas fa-paper-plane"></i> <strong>From:</strong> ${escapeHtml(from)}</span>
            <span><i class="fas fa-envelope"></i> <strong>To:</strong> ${escapeHtml(currentEmailId)}</span>
            <span><i class="far fa-calendar"></i> <strong>Date:</strong> ${formattedDate}</span>
          </div>
          <div class="message-body-content">
            ${displayContent}
          </div>
          <button class="back-btn" id="detailBackBtn"><i class="fas fa-arrow-left"></i> Back to Inbox</button>
        </div>
      `;
      const backBtn = document.getElementById('detailBackBtn');
      if (backBtn) backBtn.addEventListener('click', () => loadInbox());
    } catch (err) {
      console.error(err);
      showToast('Could not open email', true);
      loadInbox();
    }
  }

  function copyMail() {
    const emailValue = document.getElementById('email').value;
    if (!emailValue || emailValue === '') {
      showToast('No email address to copy. Generate first.', true);
      return;
    }
    navigator.clipboard.writeText(emailValue).then(() => {
      showToast('📧 Email copied to clipboard!', false);
    }).catch(() => {
      showToast('Manual copy: ' + emailValue, false);
    });
  }

  function updateBadge(count) {
    const badge = document.getElementById('countBadge');
    if (badge) badge.innerText = count;
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  // Auto refresh inbox every 6 seconds if session exists
  let autoRefreshInterval = null;
  function startAutoRefresh() {
    if (autoRefreshInterval) clearInterval(autoRefreshInterval);
    autoRefreshInterval = setInterval(() => {
      if (currentSid && currentEmailId && !document.querySelector('.detail-view')) {
        loadInbox().catch(e => console.log('auto refresh err', e));
      }
    }, 6000);
  }

  // Event listeners
  document.getElementById('generateBtn').addEventListener('click', generateMail);
  document.getElementById('refreshBtn').addEventListener('click', () => {
    if (!currentSid) {
      showToast('Generate an email first', true);
    } else {
      loadInbox();
    }
  });
  document.getElementById('copyBtn').addEventListener('click', copyMail);
  
  startAutoRefresh();
  
  // Initial empty state
  if (!currentSid) {
    document.getElementById('inbox').innerHTML = `<div class="empty-state"><i class="fas fa-plus-circle"></i><span>Tap "Generate Mail" to create inbox</span></div>`;
  }
</script>
</body>
</html>
