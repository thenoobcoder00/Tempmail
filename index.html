<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover" />
  <title>Tempify · Disposable Email (Netlify Ready)</title>
  <!-- Google Fonts + Font Awesome 6 -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: radial-gradient(circle at 10% 20%, #0a0f1e, #070b17);
      min-height: 100vh;
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
    }

    .container {
      width: 100%;
      max-width: 1000px;
      margin: 0 auto;
      background: rgba(12, 18, 34, 0.85);
      backdrop-filter: blur(14px);
      border-radius: 2rem;
      border: 1px solid rgba(59, 130, 246, 0.35);
      box-shadow: 0 30px 50px -20px rgba(0, 0, 0, 0.6), 0 0 0 0.5px rgba(56, 189, 248, 0.2);
      overflow: hidden;
      transition: all 0.2s ease;
    }

    .header {
      padding: 20px 24px 12px 24px;
      border-bottom: 1px solid rgba(71, 85, 105, 0.5);
      background: rgba(2, 6, 23, 0.4);
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 800;
      background: linear-gradient(125deg, #E0F2FE, #7AA9FF, #A5F3FC);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.5px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    h1 i {
      background: none;
      color: #3b82f6;
      font-size: 1.7rem;
    }

    .sub {
      color: #90a3bf;
      font-size: 0.75rem;
      margin-top: 8px;
    }

    .email-card {
      margin: 20px 20px 16px 20px;
      background: rgba(15, 23, 42, 0.8);
      border-radius: 1.5rem;
      border: 1px solid #2d3a5e;
    }

    .email-label {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 18px 0 18px;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 600;
      color: #7aa2f7;
    }

    .email-input-area {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 18px 18px 18px;
      flex-wrap: wrap;
    }

    #email {
      flex: 1;
      background: #020617;
      border: 1px solid #334155;
      border-radius: 1.2rem;
      padding: 14px 18px;
      color: #f1f5f9;
      font-size: 0.9rem;
      font-weight: 500;
      outline: none;
      width: 100%;
      min-width: 0;
    }

    .copy-btn-icon {
      background: #1e2a47;
      border: none;
      padding: 12px 20px;
      border-radius: 1.2rem;
      color: #cbd5ff;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
      transition: 0.2s;
    }

    .action-group {
      display: flex;
      gap: 12px;
      margin: 0px 20px 22px 20px;
      flex-wrap: wrap;
    }

    .btn-modern {
      background: rgba(37, 99, 235, 0.2);
      border: 1px solid rgba(59, 130, 246, 0.6);
      padding: 11px 18px;
      border-radius: 2.5rem;
      font-weight: 600;
      font-size: 0.85rem;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      backdrop-filter: blur(4px);
      transition: all 0.2s ease;
      color: #eef2ff;
      flex: 1 0 auto;
      justify-content: center;
    }

    .btn-primary {
      background: #2563eb;
      border-color: #60a5fa;
      color: white;
      box-shadow: 0 6px 12px -6px #1e3a8a;
    }

    .inbox-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 20px 0px 20px;
    }

    .inbox-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: #cbd5ff;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .badge-count {
      background: #1e293b;
      padding: 2px 10px;
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: 600;
      color: #90cdf4;
    }

    .messages-area {
      padding: 12px 16px 28px 16px;
      max-height: 520px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
      -webkit-overflow-scrolling: touch;
    }

    .messages-area::-webkit-scrollbar {
      width: 4px;
    }
    .messages-area::-webkit-scrollbar-track {
      background: #0f172a;
      border-radius: 8px;
    }
    .messages-area::-webkit-scrollbar-thumb {
      background: #3b82f6;
      border-radius: 8px;
    }

    .mail-card {
      background: rgba(30, 41, 59, 0.75);
      backdrop-filter: blur(4px);
      border-radius: 1.25rem;
      padding: 1rem 1.2rem;
      cursor: pointer;
      transition: all 0.2s ease;
      border: 1px solid rgba(71, 85, 105, 0.6);
    }

    .mail-card:active {
      transform: scale(0.99);
      background: #2563eb20;
    }

    .mail-subject {
      font-weight: 700;
      font-size: 0.95rem;
      color: #f0f9ff;
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
      word-break: break-word;
    }

    .mail-from {
      font-size: 0.75rem;
      color: #9bb5e6;
      display: flex;
      align-items: center;
      gap: 6px;
      word-break: break-all;
    }

    .mail-date {
      font-size: 0.65rem;
      color: #7f8ea3;
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 10px;
    }

    .empty-state {
      text-align: center;
      padding: 42px 20px;
      background: rgba(15, 23, 42, 0.5);
      border-radius: 1.8rem;
      border: 1px dashed #334155;
      color: #94a3b8;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .empty-state i {
      font-size: 2.8rem;
      opacity: 0.6;
    }

    .detail-view {
      background: #0f172af0;
      border-radius: 1.5rem;
      padding: 1.2rem;
      border: 1px solid #2d3e66;
      animation: fadeSlide 0.2s ease;
    }

    .detail-subject {
      font-size: 1.3rem;
      font-weight: 700;
      color: #eef2ff;
      margin-bottom: 16px;
      word-break: break-word;
    }

    .detail-meta {
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: #02061770;
      padding: 12px 14px;
      border-radius: 1rem;
      margin: 14px 0;
      font-size: 0.75rem;
    }

    .detail-meta span {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      word-break: break-word;
    }

    .message-body-content {
      background: #020617a0;
      padding: 18px;
      border-radius: 1.2rem;
      margin: 18px 0;
      overflow-x: auto;
      font-size: 0.85rem;
      line-height: 1.5;
      color: #e2e8f0;
    }

    pre {
      white-space: pre-wrap;
      word-break: break-word;
      font-family: 'Inter', monospace;
    }

    .back-btn {
      background: #1e293b;
      border: none;
      padding: 12px 20px;
      border-radius: 2rem;
      font-weight: 500;
      color: #b9d0ff;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      justify-content: center;
    }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(8px);}
      to { opacity: 1; transform: translateY(0);}
    }

    footer {
      font-size: 0.65rem;
      text-align: center;
      padding: 16px 20px 20px;
      color: #5b6e8c;
      border-top: 1px solid rgba(71, 85, 105, 0.3);
    }

    @media (max-width: 580px) {
      body { padding: 12px; }
      h1 { font-size: 1.45rem; }
      .email-input-area { flex-direction: column; align-items: stretch; }
      .copy-btn-icon { justify-content: center; }
      .btn-modern { padding: 10px 12px; font-size: 0.8rem; }
      .messages-area { max-height: 460px; }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1><i class="fas fa-envelope-open-text"></i> Tempify</h1>
    <div class="sub"><i class="fas fa-globe"></i> Netlify ready · temp mail</div>
  </div>

  <div class="email-card">
    <div class="email-label"><i class="fas fa-at"></i> <span>disposable address</span></div>
    <div class="email-input-area">
      <input type="text" id="email" readonly placeholder="Generate new email">
      <button class="copy-btn-icon" onclick="copyMail()"><i class="fas fa-copy"></i> <span>Copy</span></button>
    </div>
  </div>

  <div class="action-group">
    <button class="btn-modern btn-primary" id="generateBtn"><i class="fas fa-magic"></i> Generate Mail</button>
    <button class="btn-modern" id="refreshBtn"><i class="fas fa-rotate-right"></i> Refresh Inbox</button>
  </div>

  <div class="inbox-header">
    <div class="inbox-title"><i class="fas fa-inbox"></i> Messages <span id="countBadge" class="badge-count">0</span></div>
    <i class="fas fa-chevron-down" style="color:#5680c7; font-size:0.7rem;"></i>
  </div>

  <div id="inbox" class="messages-area">
    <div class="empty-state"><i class="far fa-envelope"></i><span>Ready · tap "Generate Mail"</span></div>
  </div>
  <footer><i class="fas fa-sync-alt"></i> Auto-refresh 5s · works on Netlify/Vercel</footer>
</div>

<script>
  // ---------- CONFIGURATION ----------
  let token = "";
  let currentEmail = "";
  const DEFAULT_PASSWORD = "TempSecure2025!";

  // Helper: delay and retry logic for flaky networks / CORS resilience
  async function fetchWithRetry(url, options, retries = 2) {
    for (let i = 0; i <= retries; i++) {
      try {
        const res = await fetch(url, { ...options, mode: 'cors', credentials: 'omit' });
        if (res.ok || res.status === 422) return res;
        if (i === retries) return res;
        await new Promise(r => setTimeout(r, 600));
      } catch (err) {
        if (i === retries) throw err;
        await new Promise(r => setTimeout(r, 800));
      }
    }
    throw new Error("Network failed after retries");
  }

  // Show temporary toast alert in UI (better than alert)
  function showMessage(msg, isError = false) {
    const existingToast = document.querySelector('.temp-toast');
    if(existingToast) existingToast.remove();
    const toast = document.createElement('div');
    toast.className = 'temp-toast';
    toast.innerText = msg;
    toast.style.position = 'fixed';
    toast.style.bottom = '20px';
    toast.style.left = '50%';
    toast.style.transform = 'translateX(-50%)';
    toast.style.backgroundColor = isError ? '#b91c1c' : '#1e3a8a';
    toast.style.color = 'white';
    toast.style.padding = '12px 20px';
    toast.style.borderRadius = '40px';
    toast.style.fontSize = '0.8rem';
    toast.style.zIndex = '9999';
    toast.style.backdropFilter = 'blur(12px)';
    toast.style.boxShadow = '0 4px 12px black';
    toast.style.fontWeight = '500';
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2800);
  }

  // Fetch domains and generate full email address
  async function generateMail() {
    const genBtn = document.getElementById("generateBtn");
    const originalText = genBtn.innerHTML;
    genBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Creating...';
    genBtn.disabled = true;

    try {
      // 1) Get available domain
      const domainRes = await fetchWithRetry("https://api.mail.tm/domains", {
        method: "GET",
        headers: { "Accept": "application/json" }
      });
      if (!domainRes.ok) throw new Error("Failed to fetch domains");
      const domainData = await domainRes.json();
      const domainsList = domainData["hydra:member"];
      if (!domainsList || domainsList.length === 0) throw new Error("No domains available");
      const domain = domainsList[0].domain;

      // 2) Create random email address
      const randomId = "tmp_" + Math.random().toString(36).substring(2, 12) + Date.now().toString(36);
      const email = `${randomId}@${domain}`;
      const password = DEFAULT_PASSWORD;

      // 3) Create account (with proper content-type)
      const createResp = await fetchWithRetry("https://api.mail.tm/accounts", {
        method: "POST",
        headers: { "Content-Type": "application/json", "Accept": "application/json" },
        body: JSON.stringify({ address: email, password: password })
      });
      
      // 422 means account might already exist? but with unique random it's rare. still we continue to login.
      if (!createResp.ok && createResp.status !== 422) {
        const errText = await createResp.text();
        throw new Error(`Account creation error: ${createResp.status}`);
      }

      // 4) Obtain authentication token
      const tokenResp = await fetchWithRetry("https://api.mail.tm/token", {
        method: "POST",
        headers: { "Content-Type": "application/json", "Accept": "application/json" },
        body: JSON.stringify({ address: email, password: password })
      });
      if (!tokenResp.ok) throw new Error("Token request failed");
      const tokenData = await tokenResp.json();
      token = tokenData.token;
      currentEmail = email;

      // Update UI
      document.getElementById("email").value = currentEmail;
      showMessage("✅ Temporary email created!", false);
      await loadInbox();
    } catch (err) {
      console.error("Generation error:", err);
      showMessage("⚠️ Failed to generate mail. Check network or retry.", true);
      // Reset token
      token = "";
      currentEmail = "";
      document.getElementById("email").value = "";
      const inboxDiv = document.getElementById("inbox");
      inboxDiv.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><span>Error: ${err.message.substring(0, 70)}</span><span style="font-size:12px;">Tap Generate again</span></div>`;
      updateBadge(0);
    } finally {
      genBtn.innerHTML = originalText;
      genBtn.disabled = false;
    }
  }

  // Load messages from inbox
  async function loadInbox() {
    if (!token) {
      const inboxDiv = document.getElementById("inbox");
      inboxDiv.innerHTML = `<div class="empty-state"><i class="fas fa-key"></i><span>No active session · Generate an email first</span></div>`;
      updateBadge(0);
      return;
    }

    try {
      const response = await fetchWithRetry("https://api.mail.tm/messages", {
        method: "GET",
        headers: { "Authorization": `Bearer ${token}`, "Accept": "application/json" }
      });
      if (!response.ok) {
        if (response.status === 401) {
          token = "";
          currentEmail = "";
          document.getElementById("email").value = "";
          throw new Error("Session expired. Generate new email.");
        }
        throw new Error("Inbox fetch failed");
      }
      const data = await response.json();
      const mails = data["hydra:member"] || [];
      const inboxDiv = document.getElementById("inbox");

      if (mails.length === 0) {
        inboxDiv.innerHTML = `<div class="empty-state"><i class="far fa-inbox"></i><span>No messages yet · waiting...</span></div>`;
        updateBadge(0);
        return;
      }

      updateBadge(mails.length);
      const sortedMails = [...mails].reverse();
      inboxDiv.innerHTML = "";
      sortedMails.forEach(mail => {
        const mailCard = document.createElement("div");
        mailCard.className = "mail-card";
        mailCard.setAttribute("data-id", mail.id);
        mailCard.innerHTML = `
          <div class="mail-subject"><span><i class="fas fa-envelope" style="margin-right:6px;"></i> ${escapeHtml(mail.subject || "(No Subject)")}</span></div>
          <div class="mail-from"><i class="fas fa-user-circle"></i> ${escapeHtml(mail.from?.address || "Unknown")}</div>
          <div class="mail-date"><i class="far fa-clock"></i> ${formatDate(mail.createdAt)}</div>
        `;
        mailCard.addEventListener("click", () => openMail(mail.id));
        inboxDiv.appendChild(mailCard);
      });
    } catch (err) {
      console.warn(err);
      const inboxDiv = document.getElementById("inbox");
      inboxDiv.innerHTML = `<div class="empty-state"><i class="fas fa-bug"></i><span>${err.message}</span><span>↻ Refresh manually</span></div>`;
    }
  }

  async function openMail(id) {
    if (!token) return;
    try {
      const resp = await fetchWithRetry(`https://api.mail.tm/messages/${id}`, {
        method: "GET",
        headers: { "Authorization": `Bearer ${token}`, "Accept": "application/json" }
      });
      if (!resp.ok) throw new Error("Cannot load message");
      const detail = await resp.json();
      const inboxContainer = document.getElementById("inbox");
      
      let contentHtml = "";
      if (detail.html && detail.html.length > 0 && detail.html[0] && detail.html[0].trim() !== "") {
        contentHtml = detail.html[0];
      } else {
        contentHtml = `<pre>${escapeHtml(detail.text || "(No text content)")}</pre>`;
      }

      inboxContainer.innerHTML = `
        <div class="detail-view">
          <div class="detail-subject"><i class="far fa-envelope-open" style="margin-right:8px;"></i> ${escapeHtml(detail.subject || "No Subject")}</div>
          <div class="detail-meta">
            <span><i class="fas fa-paper-plane"></i> <strong>From:</strong> ${escapeHtml(detail.from?.address || "Unknown")}</span>
            <span><i class="fas fa-envelope"></i> <strong>To:</strong> ${escapeHtml(currentEmail)}</span>
            <span><i class="far fa-calendar"></i> <strong>Date:</strong> ${formatDate(detail.createdAt)}</span>
          </div>
          <div class="message-body-content">${contentHtml}</div>
          <button class="back-btn" id="detailBackBtn"><i class="fas fa-arrow-left"></i> Back to Inbox</button>
        </div>
      `;
      const backBtn = document.getElementById("detailBackBtn");
      if (backBtn) backBtn.addEventListener("click", () => loadInbox());
    } catch (err) {
      console.error(err);
      showMessage("Could not open message", true);
      loadInbox();
    }
  }

  function copyMail() {
    const emailVal = document.getElementById("email").value;
    if (!emailVal || emailVal === "") {
      showMessage("No email to copy. Generate first.", true);
      return;
    }
    navigator.clipboard.writeText(emailVal).then(() => {
      showMessage("✉️ Email copied to clipboard!", false);
    }).catch(() => {
      showMessage("Manual copy: " + emailVal, false);
    });
  }

  function updateBadge(count) {
    const badge = document.getElementById("countBadge");
    if (badge) badge.innerText = count;
  }

  function formatDate(isoString) {
    if (!isoString) return "Just now";
    try {
      const d = new Date(isoString);
      return d.toLocaleString(undefined, { hour: '2-digit', minute:'2-digit', day:'numeric', month:'short' });
    } catch(e) { return "Recent"; }
  }

  function escapeHtml(str) {
    if (!str) return "";
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  // Auto refresh handler (secure)
  let intervalId = null;
  function startAutoRefresh() {
    if (intervalId) clearInterval(intervalId);
    intervalId = setInterval(() => {
      if (token && currentEmail && !document.querySelector(".detail-view")) {
        loadInbox().catch(e => console.log("auto refresh err", e));
      }
    }, 5000);
  }

  // Attach global functions and event listeners
  window.generateMail = generateMail;
  window.loadInbox = loadInbox;
  window.copyMail = copyMail;

  document.getElementById("generateBtn").addEventListener("click", generateMail);
  document.getElementById("refreshBtn").addEventListener("click", () => {
    if (!token) showMessage("G
